name: Reusable Claude PR Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          classify_inline_comments: true
          claude_args: |
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checkout:*),Bash(gh pr review:*),Bash(gh api:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(cat:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(ls:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are Qadar's production code review gate for this pull request.

            Steps you MUST take:
            1. Read the PR title, body, and full diff via `gh pr view $PR_NUMBER --json title,body,files`
               and `gh pr diff $PR_NUMBER`.
            2. Analyse the diff using the focus areas and severity rubric below.
            3. Publish a single PR review by invoking:
                  gh pr review $PR_NUMBER --comment --body "<your review markdown>"
               The review body MUST start with one of:
                  `Claude review: NO ACTIONABLE FINDINGS`
                  `Claude review: FINDINGS`
               followed by a bullet list of findings, each prefixed with [P0], [P1], or [P2].

            Severity rubric (exactly one prefix per finding):
            - [P0] exploitable security issue, secret leak, broken auth, data exfiltration path, or runtime enforcement bypass
            - [P1] material correctness flaw, IDOR, missing trust-boundary input validation, supply-chain concern, or IaC misconfiguration with production impact
            - [P2] style/performance/maintainability suggestion

            Constraints:
            - Only high-confidence findings tied to changed lines.
            - Each finding: severity prefix, file path, why it matters, concrete fix.
            - If nothing actionable, post the NO ACTIONABLE FINDINGS line plus a one-sentence summary of what changed.

            Mandatory focus areas:
            - secrets handling and secret exposure risk
            - authentication and authorization correctness
            - data flow, egress, and exfiltration paths
            - runtime policy and guardrail enforcement
            - dependency and supply-chain risk surface
            - infrastructure-as-code misconfiguration risk

            Always finish by posting the review with `gh pr review`. Do not stop without publishing.
